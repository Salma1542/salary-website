<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Salary App</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container vh-100 d-flex align-items-center justify-content-center p-4">
        <div class="login-card shadow-lg">
            <div class="row g-0">

                <div class="col-lg-6 d-none d-lg-flex  flex-column left-side">
                    <div>
                        <div class="d-flex align-items-center gap-3 mb-5">
                            <span class="icon">
                                <i class="bi bi-wallet2"></i>
                            </span>
                            <h2 class="salary-title">Salary App</h2>
                        </div>

                        <h1 class="display-5 fw-bold lh-1">
                            Precision in every<br>payroll
                        </h1>
                        <p class="mt-4 opacity-90 fw-light lead">
                            Experience the future of payroll management with our<br>
                            pristine, secure interface designed for absolute clarity.
                        </p>
                    </div>

                    <div class="d-flex align-items-center gap-3">
                        <div class="avatar-group d-flex">
                            <div class="avatar bg-secondary rounded-circle"></div>
                            <div class="avatar bg-dark rounded-circle ms-n3"></div>
                            <div class="avatar bg-primary rounded-circle ms-n3"></div>
                        </div>
                        <small class="text-uppercase fw-semibold opacity-75">
                            Trusted by 2,000+ admins
                        </small>
                    </div>
                </div>

                <div class="col-lg-6  right-side d-flex flex-column">
                    <div class="mb-auto">
                        <h3>Welcome back</h3>
                        <small class="text-muted">Please sign in to continue</small>
                    </div>

                    <form class="mt-4" id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">UserName</label>
                            <input type="text" class="form-control" placeholder="admin" id="userName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" placeholder="•••" id="password" required>
                        </div>
<p id="errorMessage" style="color: red; font-size: 14px; margin-top: 10px; display: none;"></p>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="text-decoration-none small">Forgot password?</a>
                        </div>

                        <button type="submit" class="btn btn-login w-100 login">
                            Sign In
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <small class="text-muted">
                            Don't have an account? 
                            <a href="#" class="text-decoration-none">Sign up</a>
                        </small>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
