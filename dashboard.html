<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary App - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="salary.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Salary <span>App</span></div>
        <button class="logout-btn">Logout</button>
    </nav>
<div class="container">
    <section class="salary-form card">
<h3>Create New Salary Entry</h3>
<form id="salaryForm">
                <div class="grid-inputs d-grid ">
                    <div class="input-group">
                        <label>Employee Name</label>
                        <input type="text" id="empName" class="input-form" placeholder="e.g. Ali Mahmoud" required>
                    </div>
                    <div class="input-group">
                        <label>Basic Salary</label>
                        <input type="number" id="basicSalary" class="input-form" placeholder="0.00" required>
                    </div>
                    <div class="input-group">
                        <label>Bonus</label>
                        <input type="number" id="bonus"  class="input-form"placeholder="0.00">
                    </div>
                    <div class="input-group">
                        <label>Penalty</label>
                        <input type="number" id="penalty" class="input-form" placeholder="0.00">
                    </div>
                    <div class="input-group">
                        <label>Extra Hours</label>
                        <input type="number" id="extraHours" class="input-form" placeholder="0">
                    </div>
                    <div class="input-group">
                        <label>Operators</label>
                        <select id="operatorSelector" class="input-form">
                           <option value="Operator">Operator</option>
<option value="Salesman">Salesman</option>
<option value="Admin">Admin</option>

                        </select>
                    </div>
                    <div class="input-group">
                        <label>Currency</label>
                     <select id="currency" class="input-form">
    <option value="USD">US Dollars ($)</option>
    <option value="EGP" selected>Egyptian Pound (EGP)</option>
    <option value="SAR">Saudi Arabia Rial</option>
    <option value="EUR">Euro</option>
</select>
                    </div>
                </div>
                <div class="form-actions">
                    <button  class="btn add">Add Employee</button>
                    <button type="reset" class="btn-outline">Clear Fields</button>
                </div>
            </form>
    </section>
    <section class="salary-form table-section">
            <h3>Employee Records</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
    <tr>
        <th rowspan="2">Name</th>
        <th rowspan="2">Basic</th>
        <th rowspan="2">Bonus</th>
        <th rowspan="2">Penalty</th>
        
        <th colspan="3">Extra Hours</th>
        
        <th rowspan="2">Gross</th>
        
        <th colspan="2">Taxes</th>
        
        <th rowspan="2">Net Salary</th>
    </tr>
    <tr>
        <th>No. of Hours</th>
        <th>Hour Value</th>
        <th>Total</th>
        
        <th>Rate</th>
        <th>Value</th>
    </tr>
</thead>
                    <tbody id="employeeTableBody">
                        </tbody>
                </table>
            </div>
        </section>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>

    </body>
</html>
